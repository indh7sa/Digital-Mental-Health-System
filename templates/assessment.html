<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare AI | Mental Health Assessment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body{
            background:#f5f7fb;
            font-family:Poppins,sans-serif;
        }

        .container-box{
            width:70%;
            margin:40px auto;
            background:#fff;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#6C63FF;
            margin-bottom:30px;
            font-weight:bold;
        }

        .question{
            margin-bottom:25px;
        }

        .btn-submit{
            width:100%;
            background:#6C63FF;
            color:white;
            border:none;
            padding:15px;
            border-radius:10px;
            font-size:18px;
        }

        .btn-submit:hover{
            background:#564fd8;
        }
    </style>
</head>

<body>

<div class="container-box">

<h2>
<i class="bi bi-clipboard2-pulse"></i>
Mental Health Assessment
</h2>

<form action="/assessment" method="POST">

<div class="question">
<label><b>1. I feel stressed because of my studies.</b></label>

<select class="form-select" name="q1" required>
<option value="">Select</option>
<option value="0">Never</option>
<option value="1">Sometimes</option>
<option value="2">Often</option>
<option value="3">Always</option>
</select>
</div>

<div class="question">
<label><b>2. I feel anxious most of the time.</b></label>

<select class="form-select" name="q2" required>
<option value="">Select</option>
<option value="0">Never</option>
<option value="1">Sometimes</option>
<option value="2">Often</option>
<option value="3">Always</option>
</select>
</div>

<div class="question">
<label><b>3. I have difficulty sleeping.</b></label>

<select class="form-select" name="q3" required>
<option value="">Select</option>
<option value="0">Never</option>
<option value="1">Sometimes</option>
<option value="2">Often</option>
<option value="3">Always</option>
</select>
</div>

<div class="question">
<label><b>4. I feel lonely.</b></label>

<select class="form-select" name="q4" required>
<option value="">Select</option>
<option value="0">Never</option>
<option value="1">Sometimes</option>
<option value="2">Often</option>
<option value="3">Always</option>
</select>
</div>

<div class="question">
<label><b>5. I enjoy my daily activities.</b></label>

<select class="form-select" name="q5" required>
<option value="">Select</option>
<option value="3">Never</option>
<option value="2">Sometimes</option>
<option value="1">Often</option>
<option value="0">Always</option>
</select>
</div>

<button type="submit" class="btn-submit">
Submit Assessment
</button>

</form>

</div>

</body>
</html>
