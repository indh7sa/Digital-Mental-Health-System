<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindCare AI - Counseling</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(
135deg,
#667eea,
#764ba2,
#00BFA6
);

background-size:300% 300%;

animation:bg 10s ease infinite;

min-height:100vh;

padding:40px;

}

@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.heading{

text-align:center;

color:white;

margin-bottom:40px;

}

.heading h1{

font-weight:700;

font-size:40px;

}

.heading p{

opacity:0.9;

}

.card-box{

background:rgba(255,255,255,0.18);

backdrop-filter:blur(25px);

border-radius:25px;

padding:25px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

margin-bottom:30px;

}

.section-title{

font-size:25px;

font-weight:600;

color:white;

margin-bottom:25px;

}

.counselor-card{

background:white;

border-radius:20px;

padding:25px;

text-align:center;

transition:0.3s;

height:100%;

}

.counselor-card:hover{

transform:translateY(-10px);

}

.avatar{

width:90px;

height:90px;

background:#764ba2;

color:white;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:35px;

margin:auto;

margin-bottom:15px;

}

.counselor-card h4{

font-weight:600;

}

.special{

color:#666;

font-size:14px;

margin-bottom:10px;

}

.rating{

color:#ffc107;

margin-bottom:15px;

}

.btn-book{

background:#00BFA6;

color:white;

border:none;

padding:10px 25px;

border-radius:30px;

transition:0.3s;

}

.btn-book:hover{

background:#009b89;

}

.form-control,

.form-select{

height:50px;

border-radius:15px;

border:none;

}

.btn-submit{

width:100%;

height:50px;

border:none;

border-radius:15px;

background:white;

color:#764ba2;

font-size:18px;

font-weight:600;

transition:0.3s;

}

.btn-submit:hover{

transform:translateY(-3px);

}

.table{

background:white;

border-radius:15px;

overflow:hidden;

}

.badge{

padding:8px 15px;

font-size:13px;

}

</style>

</head>

<body>


<div class="heading">

<h1>

🧠 Counseling Support

</h1>

<p>

Book appointments with mental health professionals

</p>

</div>



<div class="card-box">

<div class="section-title">

Available Counselors

</div>

<div class="row g-4">

<div class="col-md-4">

<div class="counselor-card">

<div class="avatar">

👩

</div>

<h4>

Dr. Priya

</h4>

<div class="special">

Clinical Psychologist

</div>

<div class="rating">

★★★★★

</div>

<button class="btn-book">

Book Now

</button>

</div>

</div>



<div class="col-md-4">

<div class="counselor-card">

<div class="avatar">

👨

</div>

<h4>

Dr. Kumar

</h4>

<div class="special">

Stress Management
