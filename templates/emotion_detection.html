<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindCare AI - Emotion Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

min-height:100vh;

background:linear-gradient(
135deg,
#667eea,
#764ba2,
#00BFA6
);

background-size:300% 300%;

animation:bgMove 12s ease infinite;

padding:40px;

overflow-x:hidden;

}

@keyframes bgMove{

0%{

background-position:0% 50%;

}

50%{

background-position:100% 50%;

}

100%{

background-position:0% 50%;

}

}

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

}

.c1{

width:300px;

height:300px;

top:-100px;

left:-80px;

}

.c2{

width:220px;

height:220px;

bottom:-70px;

right:-70px;

}

.container-box{

position:relative;

z-index:10;

max-width:1200px;

margin:auto;

}

.header{

text-align:center;

color:white;

margin-bottom:40px;

}

.header h1{

font-weight:700;

font-size:42px;

}

.header p{

opacity:0.9;

}

.glass-card{

background:rgba(255,255,255,0.18);

backdrop-filter:blur(25px);

border-radius:30px;

padding:30px;

box-shadow:

0 15px 35px rgba(0,0,0,0.2);

margin-bottom:30px;

}

.glass-card h3{

color:white;

margin-bottom:20px;

font-weight:600;

}

textarea{

width:100%;

height:180px;

border:none;

outline:none;

border-radius:20px;

padding:20px;

font-size:16px;

resize:none;

}

.btn-predict{

margin-top:20px;

width:100%;

height:55px;

border:none;

border-radius:20px;

background:white;

color:#764ba2;

font-size:18px;

font-weight:700;

transition:0.3s;

}

.btn-predict:hover{

transform:translateY(-5px);

}

.result-card{

text-align:center;

color:white;

}

.emoji{

font-size:80px;

margin-bottom:15px;

}

.emotion{

font-size:35px;

font-weight:700;

}

.confidence{

margin-top:20px;

}

.progress{

height:22px;

border-radius:30px;

}

.progress-bar{

font-size:14px;

font-weight:600;

}

.table{

background:white;

border-radius:15px;

overflow:hidden;

}

</style>

</head>

<body>

<div class="circle c1"></div>

<div class="circle c2"></div>

<div class="container-box">

<div class="header">

<h1>

🧠 Emotion Detection

</h1>

<p>

AI-powered emotional analysis for mental wellness

</p>

</div>


<div class="row">

<div class="col-lg-6">

<div class="glass-card">

<h3>

Enter Your Thoughts

</h3>

<form>

<textarea

placeholder="How are you feeling today?

Example:

I feel stressed because of my exams and I'm unable to concentrate."

></textarea>

<button class="btn-predict">

<i class="bi bi-cpu-fill"></i>

Analyze Emotion

</button>

</form>

</div>

</div>



<div class="col-lg-6">

<div class="glass-card result-card">

<h3>

Prediction Result

</h3>

<div class="emoji">

😟

</div>

<div class="emotion">

Stress

</div>

<p>

You seem to be experiencing stress.

Try deep breathing and relaxation exercises.

</p>

<div class="confidence">

<h5>

Confidence Score

</h5>

<div class="progress">

<div

class="progress-bar bg-success"

style="width:93%;">

93%

</div>

</div>

</div>

</div>

</div>

</div>

<form method="POST">

<textarea 
name="text"
placeholder="Write your feelings..."
required>
</textarea>

<button type="submit">
Detect Emotion
</button>

</form>

<div class="glass-card">

<h3>

Recent Emotion History

</h3>

<table class="table table-hover">

<thead>

<tr>

<th>Date</th>

<th>Input</th>

<th>Emotion</th>

<th>Confidence</th>

</tr>

</
