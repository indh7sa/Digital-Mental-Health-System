<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindCare AI | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:linear-gradient(
135deg,
#667eea,
#764ba2,
#00BFA6
);

background-size:300% 300%;

animation:bgAnimation 12s ease infinite;

}

@keyframes bgAnimation{

0%{

background-position:0% 50%;

}

50%{

background-position:100% 50%;

}

100%{

background-position:0% 50%;

}

}

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

}

.circle1{

width:320px;

height:320px;

top:-100px;

left:-100px;

}

.circle2{

width:250px;

height:250px;

bottom:-80px;

right:-80px;

}

.circle3{

width:120px;

height:120px;

top:120px;

right:150px;

}

.login-box{

position:relative;

width:430px;

padding:45px;

border-radius:30px;

background:rgba(255,255,255,0.18);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:

0 15px 35px rgba(0,0,0,0.25);

z-index:10;

}

.logo{

font-size:50px;

text-align:center;

}

.title{

text-align:center;

font-size:30px;

font-weight:700;

color:white;

margin-top:10px;

}

.subtitle{

text-align:center;

color:white;

opacity:0.9;

margin-bottom:30px;

}

.form-label{

color:white;

font-weight:500;

}

.form-control{

height:55px;

border-radius:15px;

border:none;

padding-left:15px;

}

.form-control:focus{

box-shadow:none;

border:2px solid #00BFA6;

}

.input-group-text{

background:white;

border:none;

cursor:pointer;

border-radius:0 15px 15px 0;

}

.options{

display:flex;

justify-content:space-between;

margin-top:12px;

font-size:14px;

color:white;

}

.options a{

color:white;

text-decoration:none;

}

.btn-login{

width:100%;

height:55px;

margin-top:30px;

border:none;

border-radius:15px;

background:white;

color:#6C63FF;

font-size:18px;

font-weight:700;

transition:0.3s;

}

.btn-login:hover{

transform:translateY(-5px);

box-shadow:

0 10px 25px rgba(0,0,0,0.2);

}

.divider{

text-align:center;

margin-top:25px;

color:white;

position:relative;

}

.divider::before{

content:"";

position:absolute;

left:0;

top:50%;

width:40%;

height:1px;

background:white;

}

.divider::after{

content:"";

position:absolute;

right:0;

top:50%;

width:40%;

height:1px;

background:white;

}

.social{

display:flex;

justify-content:center;

gap:20px;

margin-top:20px;

}

.social a{

width:45px;

height:45px;

background:white;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

font-size:20px;

color:#6C63FF;

transition:0.3s;

}

.social a:hover{

transform:scale(1.1);

}

.register{

text-align:center;

margin-top:25px;

color:white;

}

.register a{

text-decoration:none;

color:white;

font-weight:600;

}

</style>

</head>

<body>

<div class="circle circle1"></div>

<div class="circle circle2"></div>

<div class="circle circle3"></div>

<div class="login-box">

<div class="logo">

🧠

</div>

<div class="title">

MindCare AI

</div>

<div class="subtitle">

Digital Mental Health Support System

</div>
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-warning">
    {{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form action="{{ url_for('login') }}" method="POST">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Enter password"
required>

<span class="input-group-text"

onclick="togglePassword()">

<i class="bi bi-eye"

id="eyeIcon">

</i>

</span>

</div>

</div>

<div class="options">

<div>

<input type="checkbox">

Remember Me

</div>

<a href="#">

Forgot Password?

</a>

</div>

<button type="submit" class="btn-login">
LOGIN
</button>

</form>

<div class="divider">

OR

</div>

<div class="social">

<a href="#">

<i class="bi bi-google"></i>

</a>

<a href="#">

<i class="bi bi-facebook"></i>

</a>

<a href="#">

<i class="bi bi-twitter-x"></i>

</a>

</div>

<div class="register">

Don't have an account?
<a href="{{ url_for('register') }}">
Register
</a>

</div>

</div>

<script>

function togglePassword(){

let password=

document.getElementById("password");

let eye=

document.getElementById("eyeIcon");

if(password.type==="password"){

password.type="text";

eye.classList.replace(

"bi-eye",

"bi-eye-slash"

);

}

else{

password.type="password";

eye.classList.replace(

"bi-eye-slash",

"bi-eye"

);

}

}

</script>

</body>

</html>
