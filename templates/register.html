<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindCare AI | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

background:linear-gradient(
135deg,
#667eea,
#764ba2,
#00BFA6
);

background-size:300% 300%;

animation:bgMove 12s ease infinite;

overflow-x:hidden;

}

@keyframes bgMove{

0%{

background-position:0% 50%;

}

50%{

background-position:100% 50%;

}

100%{

background-position:0% 50%;

}

}

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

}

.c1{

width:300px;

height:300px;

top:-100px;

left:-100px;

}

.c2{

width:250px;

height:250px;

bottom:-80px;

right:-80px;

}

.register-box{

position:relative;

z-index:10;

width:700px;

padding:40px;

border-radius:30px;

background:rgba(255,255,255,0.18);

backdrop-filter:blur(25px);

box-shadow:

0 15px 35px rgba(0,0,0,0.25);

}

.logo{

text-align:center;

font-size:55px;

}

.title{

text-align:center;

color:white;

font-size:32px;

font-weight:700;

}

.subtitle{

text-align:center;

color:white;

opacity:0.9;

margin-bottom:30px;

}

.profile{

text-align:center;

margin-bottom:25px;

}

.profile img{

width:120px;

height:120px;

border-radius:50%;

border:4px solid white;

object-fit:cover;

}

.upload{

display:inline-block;

margin-top:12px;

background:white;

padding:10px 18px;

border-radius:25px;

cursor:pointer;

font-weight:600;

color:#764ba2;

}

.upload input{

display:none;

}

.form-label{

color:white;

font-weight:500;

}

.form-control,

.form-select{

height:52px;

border:none;

border-radius:15px;

}

.form-control:focus,

.form-select:focus{

box-shadow:none;

border:2px solid #00BFA6;

}

.password-box{

position:relative;

}

.eye{

position:absolute;

right:18px;

top:14px;

font-size:22px;

cursor:pointer;

color:#666;

}

.btn-register{

width:100%;

height:55px;

border:none;

border-radius:18px;

background:white;

color:#764ba2;

font-size:18px;

font-weight:700;

margin-top:20px;

transition:0.3s;

}

.btn-register:hover{

transform:translateY(-5px);

}

.login{

text-align:center;

margin-top:25px;

color:white;

}

.login a{

color:white;

font-weight:600;

text-decoration:none;

}

</style>

</head>

<body>

<div class="circle c1"></div>

<div class="circle c2"></div>

<div class="register-box">

<div class="logo">

🧠

</div>

<div class="title">

MindCare AI

</div>

<div class="subtitle">

Create Your Account

</div>



<div class="profile">

<img

src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"

id="preview">

<br>

<label class="upload">

<i class="bi bi-camera-fill"></i>

Upload Photo

<input

type="file"

accept="image/*"

onchange="loadImage(event)">

</label>

</div>



<form action="/register" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Full Name

</label>

<input

type="text"

class="form-control"

name="name"

placeholder="Enter Full Name"

required>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Email

</label>

<input

type="email"

class="form-control"

name="email"

placeholder="Enter Email"

required>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Department

</label>

<select

class="form-select"

name="department">

<option>

Select Department

</option>

<option>

Computer Science

</option>

<option>

Information Technology

</option>

<option>

Electronics

</option>

<option>

Mechanical

</option>

<option>

Civil

</option>

</select>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Year

</label>

<select

class="form-select"

name="year">

<option>

Select Year

</option>

<option>

1

</option>

<option>

2

</option>

<option>

3

</option>

<option>

4

</option>

</select>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input

type="text"

class="form-control"

name="phone"

placeholder="Enter Phone Number"

required>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select

class="form-select"

name="gender">

<option>

Female

</option>

<option>

Male

</option>

<option>

Other

</option>

</select>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Password

</label>

<div class="password-box">

<input

type="password"

class="form-control"

id="password"

name="password"

placeholder="Create Password"

required>

<i

class="bi bi-eye eye"

onclick="togglePassword('password',this)">

</i>

</div>

</div>



<div class="col-md-6 mb-3">

<label class="form-label">

Confirm Password

</label>

<div class="password-box">

<input

type="password"

class="form-control"

id="confirm"

placeholder="Confirm Password"

required>

<i

class="bi bi-eye eye"

onclick="togglePassword('confirm',this)">

</i>

</div>

</div>

</div>



<button class="btn-register">

<i class="bi bi-person-plus-fill"></i>

Register

</button>

</form>



<div class="login">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>



<script>

function loadImage(event){

const img = document.getElementById("preview");

img.src = URL.createObjectURL(event.target.files[0]);

}

function togglePassword(id,icon){

let input = document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.replace(

"bi-eye",

"bi-eye-slash"

);

}

else{

input.type="password";

icon.classList.replace(

"bi-eye-slash",

"bi-eye"

);

}

}

</script>

</body>

</html>
